<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omnia AI — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #020408;
    --cyan: #00ffe0;
    --border-cyan: rgba(0, 255, 224, 0.25);
    --text-bright: #e8fff9;
    --text-mid: rgba(200, 255, 240, 0.65);
  }
  html, body { height: 100%; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-void);
    color: var(--text-bright);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .panel {
    text-align: center;
    padding: 40px;
    border: 1px solid var(--border-cyan);
    border-radius: 14px;
    min-width: 320px;
  }
  .brand {
    font-family: 'Orbitron', sans-serif;
    color: var(--cyan);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .email { color: var(--text-mid); margin-bottom: 24px; word-break: break-all; }
  button {
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    border-radius: 8px;
    font-family: inherit;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="panel">
  <div class="brand">لوحة التحكم</div>
  <div class="email" id="userEmail">جارٍ التحقق من الهوية…</div>
  <button id="logoutBtn">تسجيل الخروج</button>
</div>

<script type="module">
  import { watchAuthState, logOut } from "./auth.js";

  // هذه هي الطريقة الأساسية لحماية أي صفحة:
  // إن لم يكن هناك مستخدم مسجّل دخوله، يتم التوجيه فوراً لصفحة تسجيل الدخول
  watchAuthState(
    (user) => {
      document.getElementById("userEmail").textContent = "مرحباً، " + user.email;
    },
    () => {
      window.location.href = "login.html";
    }
  );

  document.getElementById("logoutBtn").addEventListener("click", () => {
    logOut("login.html");
  });
</script>

</body>
</html>
