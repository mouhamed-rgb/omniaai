<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omnia AI — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-void: #020408;
    --cyan: #00ffe0;
    --cyan-glow: rgba(0, 255, 224, 0.15);
    --border-cyan: rgba(0, 255, 224, 0.25);
    --text-bright: #e8fff9;
    --text-mid: rgba(200, 255, 240, 0.65);
    --danger: #ff5470;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-void);
    color: var(--text-bright);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: linear-gradient(rgba(0,255,200,0.04) 1px, transparent 1px),
                       linear-gradient(90deg, rgba(0,255,200,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    margin: 20px;
    padding: 36px 32px;
    background: rgba(0, 255, 200, 0.03);
    border: 1px solid var(--border-cyan);
    border-radius: 14px;
    box-shadow: 0 0 40px var(--cyan-glow);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scan 3s linear infinite;
  }
  @keyframes scan { to { left: 100%; } }
  .brand {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--cyan);
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--text-mid);
    margin-bottom: 26px;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border-cyan);
    border-radius: 8px;
    color: var(--text-mid);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { background: var(--cyan-glow); color: var(--cyan); border-color: var(--cyan); }
  form { display: flex; flex-direction: column; gap: 14px; }
  form[hidden] { display: none; }
  input {
    padding: 12px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-cyan);
    border-radius: 8px;
    color: var(--text-bright);
    font-family: inherit;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: var(--cyan); }
  button[type="submit"] {
    padding: 12px;
    margin-top: 6px;
    background: var(--cyan);
    color: #00231d;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
  .message {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    min-height: 18px;
  }
  .message.error { color: var(--danger); }
  .message.success { color: var(--cyan); }
</style>
</head>
<body>

<div class="card">
  <div class="brand">OMNIA // ACCESS</div>
  <div class="subtitle">سجّل دخولك أو أنشئ حساباً جديداً</div>

  <div class="tabs">
    <button class="tab active" id="tabLogin">تسجيل الدخول</button>
    <button class="tab" id="tabSignup">حساب جديد</button>
  </div>

  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
    <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
    <button type="submit">دخول</button>
  </form>

  <form id="signupForm" hidden>
    <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required>
    <input type="password" id="signupPassword" placeholder="كلمة المرور (6 أحرف على الأقل)" required>
    <button type="submit">إنشاء حساب</button>
  </form>

  <p class="message" id="message"></p>
</div>

<script type="module">
  import { signIn, signUp } from "./auth.js";

  const tabLogin = document.getElementById("tabLogin");
  const tabSignup = document.getElementById("tabSignup");
  const loginForm = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");
  const message = document.getElementById("message");

  function showTab(tab) {
    const isLogin = tab === "login";
    tabLogin.classList.toggle("active", isLogin);
    tabSignup.classList.toggle("active", !isLogin);
    loginForm.hidden = !isLogin;
    signupForm.hidden = isLogin;
    message.textContent = "";
  }
  tabLogin.addEventListener("click", () => showTab("login"));
  tabSignup.addEventListener("click", () => showTab("signup"));

  function showMessage(text, type) {
    message.textContent = text;
    message.className = "message " + type;
  }

  function setLoading(form, isLoading) {
    form.querySelector("button[type='submit']").disabled = isLoading;
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    setLoading(loginForm, true);
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    // redirectUrl يوجّه المستخدم تلقائياً بعد نجاح تسجيل الدخول
    const result = await signIn(email, password, "dashboard.html");

    if (!result.success) {
      showMessage(result.error, "error");
      setLoading(loginForm, false);
    }
    // عند النجاح يحدث التوجيه تلقائياً، فلا حاجة لفعل شيء هنا
  });

  signupForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    setLoading(signupForm, true);
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    const result = await signUp(email, password);

    if (result.success) {
      showMessage("تم إنشاء الحساب بنجاح، يمكنك تسجيل الدخول الآن.", "success");
      showTab("login");
    } else {
      showMessage(result.error, "error");
    }
    setLoading(signupForm, false);
  });
</script>

</body>
</html>
